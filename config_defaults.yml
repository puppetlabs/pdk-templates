---
common:
  owner: puppetlabs
.gitattributes:
  include:
    '*.rb': 'eol=lf'
    '*.erb': 'eol=lf'
    '*.pp': 'eol=lf'
    '*.sh': 'eol=lf'
    '*.epp': 'eol=lf'
.gitignore:
  required: &ignorepaths
    - '.git/'
    - '.*.sw[op]'
    - '.metadata'
    - '.yardoc'
    - '.yardwarns'
    - '*.iml'
    - '/.bundle/'
    - '/.idea/'
    - '/.vagrant/'
    - '/coverage/'
    - '/bin/'
    - '/doc/'
    - '/Gemfile.local'
    - '/Gemfile.lock'
    - '/junit/'
    - '/log/'
    - '/pkg/'
    - '/spec/fixtures/manifests/'
    - '/spec/fixtures/modules/*'
    - '/tmp/'
    - '/vendor/'
    - '/.vendor/'
    - '/convert_report.txt'
    - '/update_report.txt'
    - '.DS_Store'
    - '.project'
    - '.envrc'
    - '/inventory.yaml'
    - '/spec/fixtures/litmus_inventory.yaml'
    - '.resource_types'
    - '.modules'
    - '.task_cache.json'
    - '.plan_cache.json'
    - '.rerun.json'
    - 'bolt-debug.log'
.pdkignore:
  required: *ignorepaths
  paths:
    - '/.fixtures.yml'
    - '/Gemfile'
    - '/.gitattributes'
    - '/.github/'
    - '/.gitignore'
    - '/.pdkignore'
    - '/.puppet-lint.rc'
    - '/Rakefile'
    - '/rakelib/'
    - '/.rspec'
    - '/.rubocop.yml'
    - '/.yardopts'
    - '/spec/'
    - '/.vscode/'
    - '/.sync.yml'
    - '/.devcontainer/'
.yardopts:
  markup: markdown
# Ensure that any changes to lint here are reflected within the rake_tasks.rb file inside the puppetlabs_spec_helper:
# - https://github.com/puppetlabs/puppetlabs_spec_helper/blob/main/lib/puppetlabs_spec_helper/rake_tasks.rb#L124
Rakefile:
  changelog_version_tag_pattern: 'v%s'
  linter_fail_on_warnings: true
  default_disabled_lint_checks:
    - 'relative'
    - '80chars'
    - '140chars'
    - 'class_inherits_from_params_class'
    - 'autoloader_layout'
    - 'documentation'
    - 'single_quote_string_with_variables'
  linter_exclusions:
    - '.vendor/**/*.pp'
    - '.bundle/**/*.pp'
    - 'pkg/**/*.pp'
    - 'spec/**/*.pp'
    - 'tests/**/*.pp'
    - 'types/**/*.pp'
    - 'vendor/**/*.pp'
  extras: []
.rubocop.yml:
  selected_profile: strict
  default_configs: &default_configs
    Layout/LineLength:
      Description: People have wide screens, use them.
      Max: 200

    # RSpec cops
    RSpec/BeforeAfterAll:
      Description: Beware of using after(:all) as it may cause state to leak between tests. A necessary evil in acceptance testing.
      Exclude:
        - 'spec/acceptance/**/*.rb'

    RSpec/HookArgument:
      Description: Prefer explicit :each argument, matching existing module's style
      EnforcedStyle: each

    RSpec/DescribeSymbol:
      Exclude:
        - 'spec/unit/facter/**/*.rb'

    # Style Cops
    Style/BlockDelimiters:
      Description: Prefer braces for chaining. Mostly an aesthetical choice. Better to be consistent then.
      EnforcedStyle: braces_for_chaining

    Style/ClassAndModuleChildren:
      Description: Compact style reduces the required amount of indentation.
      EnforcedStyle: compact

    Style/EmptyElse:
      Description: Enforce against empty else clauses, but allow `nil` for clarity.
      EnforcedStyle: empty

    Style/FormatString:
      Description: Following the main puppet project's style, prefer the % format format.
      EnforcedStyle: percent

    Style/FormatStringToken:
      Description: Following the main puppet project's style, prefer the simpler template tokens over annotated ones.
      EnforcedStyle: template

    Style/Lambda:
      Description: Prefer the keyword for easier discoverability.
      EnforcedStyle: literal

    Style/RegexpLiteral:
      Description: Community preference. See https://github.com/voxpupuli/modulesync_config/issues/168
      EnforcedStyle: percent_r

    Style/TernaryParentheses:
      Description: Checks for use of parentheses around ternary conditions. Enforce parentheses on complex expressions for better readability, but seriously consider breaking it up.
      EnforcedStyle: require_parentheses_when_complex

    Style/TrailingCommaInArguments:
      Description: Prefer always trailing comma on multiline argument lists. This makes diffs, and re-ordering nicer.
      EnforcedStyleForMultiline: comma

    Style/TrailingCommaInArrayLiteral:
      Description: Prefer always trailing comma on multiline literals. This makes diffs, and re-ordering nicer.
      EnforcedStyleForMultiline: comma

    Style/SymbolArray:
      Description: Using percent style obscures symbolic intent of array's contents.
      EnforcedStyle: brackets

    Style/TrailingCommaInHashLiteral:
      Description: PDK generates multiline hashes with trailing commas. Align with Style/TrailingCommaInArguments and Style/TrailingCommaInArrayLiteral (both comma) so hash literals follow the same project style.
      EnforcedStyleForMultiline: comma

    # PDK/rspec-puppet convention cops -- tuned here (not in cop_overrides) because these
    # are structural conventions of rspec-puppet and rspec-puppet-facts that every module
    # scaffolded by PDK encounters, not module-specific style preferences (D-19).

    RSpec/DescribeClass:
      Description: rspec-puppet describes its subject by string class/define name (no Ruby constant exists to reference), so this cop is never satisfiable for puppet specs. This is structurally inapplicable, not a style preference -- distinct from D-08 which governs style cops.
      Enabled: false

    RSpec/MessageSpies:
      Description: The resource-API provider specs PDK generates legitimately use message spies (expect().to receive) in their scaffolded examples. Scoped to PDK-generated provider and transport spec paths only (D-08).
      Exclude:
        - 'spec/unit/puppet/provider/**/*_spec.rb'
        - 'spec/unit/puppet/transport/**/*_spec.rb'

    RSpec/ExampleLength:
      Description: The resource-API provider specs PDK generates contain multi-line examples covering multiple CRUD operations. Scoped to PDK-generated provider and transport spec paths only (D-08).
      Exclude:
        - 'spec/unit/puppet/provider/**/*_spec.rb'
        - 'spec/unit/puppet/transport/**/*_spec.rb'

    RSpec/MultipleExpectations:
      Description: The resource-API provider specs PDK generates use multiple expectations per example to cover resource attribute checks. Scoped to PDK-generated provider and transport spec paths only (D-08).
      Exclude:
        - 'spec/unit/puppet/provider/**/*_spec.rb'
        - 'spec/unit/puppet/transport/**/*_spec.rb'

    RSpec/VerifiedDoubleReference:
      Description: The resource-API provider and transport specs PDK generates use string-referenced instance doubles (the Puppet provider constant is not loaded in the spec context). Scoped to PDK-generated provider and transport spec paths only (D-08).
      Exclude:
        - 'spec/unit/puppet/provider/**/*_spec.rb'
        - 'spec/unit/puppet/transport/**/*_spec.rb'

    RSpec/ContextWording:
      Description: rspec-puppet-facts uses the `context "on #{os}"` idiom in generated facts, class, and defined-type specs. The `on` prefix is added to the allowed list so this well-known idiom does not trigger the cop.
      Prefixes:
        - when
        - with
        - without
        - 'on'

    Style/MixinUsage:
      Description: rspec-puppet-facts requires the top-level `include RspecPuppetFacts` idiom in spec_helper, which cannot be cleanly restructured without breaking the facts test harness. Scoped to spec_helper only (D-07).
      Exclude:
        - 'spec/spec_helper.rb'

    Lint/EmptyClass:
      Description: The generated transport device file uses the idiomatic Ruby namespace forward-declaration `class Puppet::Util::NetworkDevice; end`. An empty class is the standard namespace-shim idiom here and is not non-idiomatic code. Scoped to the network_device path only (D-08).
      Exclude:
        - 'lib/puppet/util/network_device/**/*.rb'

  profiles:
    # Runs all cops using RuboCop's native NewCops: enable governance.
    # EnforcedStyle settings from default_configs are applied.
    'on': &on_profile
      configs: *default_configs

    # No cops enabled. Uses RuboCop's native DisabledByDefault switch
    # instead of enumerating per-cop Enabled: false.
    'off':
      configs:
        AllCops:
          DisabledByDefault: true
          NewCops: disable

    # Backward-compatible aliases: cleanups_only, strict, and hardcore all
    # resolve to the same output as on. Existing .sync.yml files that set
    # any of these names continue to work with zero migration required.
    cleanups_only: *on_profile
    strict: *on_profile
    hardcore: *on_profile

  # Authoritative maintainer override surface. Merged last (after defaults and
  # profile configs), so entries here take precedence:
  #   defaults -> profile configs -> cop_overrides
  # Add, configure, or disable individual cops here (e.g. CopName: { Enabled: false }
  # or CopName: { EnforcedStyle: example }). In a module's .sync.yml, entries under
  # this key deep-merge via PDK's @configs; the knockout prefix --- removes a value.
  cop_overrides: {}
Gemfile:
  required:
    ':development':
      # Json gems should be pinned to their default versions so that users aren't forced to recompile the native extensions.
      # See the following for a version matrix: https://stdgems.org/json/#gem-version
      - gem: json
        version: '= 2.6.1'
        condition: "Gem::Requirement.create(['>= 3.1.0', '< 3.1.3']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
      - gem: json
        version: '= 2.6.3'
        condition: "Gem::Requirement.create(['>= 3.2.0', '< 4.0.0']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
      - gem: json
        version: '= 2.18.0'
        condition: "Gem::Requirement.create(['>= 4.0.0', '< 5.0.0']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
        # Forces ruby to use builtin racc vs trying to compile native extensions.
      - gem: racc
        version: '~> 1.4.0'
        condition: "Gem::Requirement.create(['>= 2.7.0', '< 3.0.0']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
      - gem: deep_merge
        version: '~> 1.2.2'
      - gem: 'voxpupuli-puppet-lint-plugins'
        version: '~> 5.0'
      - gem: 'facterdb'
        version: '~> 2.1'
        condition: "Gem::Requirement.create(['< 3.0.0']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
      - gem: 'facterdb'
        version: '~> 3.0'
        condition: "Gem::Requirement.create(['>= 3.0.0']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
      - gem: 'metadata-json-lint'
        version: '~> 4.0'
      - gem: 'json-schema'
        version: '< 5.1.1'
      - gem: 'rspec-puppet-facts'
        version: '~> 4.0'
        condition: "Gem::Requirement.create(['< 3.0.0']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
      - gem: 'rspec-puppet-facts'
        version: '~> 5.0'
        condition: "Gem::Requirement.create(['>= 3.0.0']).satisfied_by?(Gem::Version.new(RUBY_VERSION.dup))"
      - gem: 'dependency_checker'
        version: '~> 1.0.0'
      - gem: 'parallel_tests'
        version: '= 3.12.1'
      - gem: 'pry'
        version: '~> 0.10'
      - gem: 'simplecov-console'
        version: '~> 0.9'
      - gem: 'puppet-debugger'
        version: '~> 1.6'
      - gem: 'rubocop'
        version: '~> 1.73.0'
      - gem: 'rubocop-performance'
        version: '~> 1.24.0'
      - gem: 'rubocop-hash_inspect'
        version: '~> 0.2'
      - gem: 'rubocop-rspec'
        version: '~> 3.5.0'
      - gem: 'rubocop-rspec_rails'
        version: '~> 2.31.0'
      - gem: 'rubocop-factory_bot'
        version: '~> 2.27.0'
      - gem: 'rubocop-capybara'
        version: '~> 2.22.0'
      - gem: 'rb-readline'
        version: '= 0.5.5'
        platforms:
          - windows
      - gem: 'bigdecimal'
        version: '< 3.2.2'
        platforms:
          - windows
    ':development, :release_prep':
      - gem: 'puppet-strings'
        version: '~> 4.0'
      - gem: 'puppetlabs_spec_helper'
        version: '~> 8.0'
      - gem: 'puppet-blacksmith'
        version:
        - '>= 7.0'
        - '< 10.0'
    ':system_tests':
      - gem: 'puppet_litmus'
        version:
        - '~> 2.5'
      - gem: 'faraday'
        version:
        - '~> 2.5'
      - gem: 'CFPropertyList'
        version:
        - '< 3.0.7'
        condition: "RUBY_PLATFORM.include?('darwin')"
      - gem: 'serverspec'
        version: '~> 2.41'
spec/default_facts.yml:
  is_pe: false
  networking:
    mac: 'AA:AA:AA:AA:AA:AA'
    ip: '172.16.254.254'
    ip6: "FE80:0000:0000:0000:AAAA:AAAA:AAAA"
spec/spec_helper.rb:
  coverage_report: true
  minimum_code_coverage_percentage: 0
  mock_with: ":rspec"
  strict_level: ":warning"
  strict_variables: true
.github/workflows/ci.yml:
  unmanaged: true
.github/workflows/nightly.yml:
  unmanaged: true
.github/workflows/release.yml:
  unmanaged: true
.github/workflows/release_prep.yml:
  unmanaged: true
